<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Official Cultiva plugin store — 9 sandboxed extensions with sha256 integrity.">
  <meta name="theme-color" content="#000000">
  <title>Cultiva Plugins · Store</title>
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #1c1c1e;
      --bg-tertiary: #2c2c2e;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
      --text-tertiary: #6e6e73;
      --border-light: rgba(255, 255, 255, 0.1);
      --accent-blue: #0a84ff;
      --font: -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif;
      --mono: ui-monospace, 'SF Mono', Menlo, monospace;
      --max: 920px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent-blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .nav {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(20px);
      background: rgba(0, 0, 0, 0.82);
      border-bottom: 1px solid var(--border-light);
    }
    .nav-inner {
      max-width: var(--max); margin: 0 auto; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { font-weight: 700; font-size: 17px; letter-spacing: -0.03em; color: var(--text-primary); }
    .brand span { color: var(--text-secondary); font-weight: 500; }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .pill {
      border: 1px solid var(--border-light);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .pill.active { background: var(--text-primary); color: var(--bg-primary); border-color: transparent; }

    .hero { max-width: var(--max); margin: 0 auto; padding: 40px 20px 12px; }
    .hero h1 { font-size: 34px; letter-spacing: -0.04em; margin-bottom: 8px; }
    .hero p { color: var(--text-secondary); font-size: 17px; max-width: 62ch; }

    .store { max-width: var(--max); margin: 0 auto; padding: 20px 20px 64px; }
    .store-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 12px; gap: 12px;
    }
    .store-head h2 { font-size: 15px; font-weight: 700; }
    .store-head span { font-size: 12px; color: var(--text-tertiary); }

    .plugins-list {
      display: flex; flex-direction: column; gap: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 8px;
    }

    .plugin-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      overflow: hidden;
    }
    .plugin-card-main { display: flex; flex-direction: column; gap: 12px; padding: 16px 18px; }
    .plugin-card-top { display: flex; gap: 14px; align-items: flex-start; }
    .plugin-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--bg-tertiary); flex-shrink: 0;
    }
    .plugin-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .plugin-description { font-size: 13px; color: var(--text-tertiary); line-height: 1.5; }
    .plugin-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; padding-top: 10px;
      border-top: 1px solid var(--border-light);
    }
    .plugin-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-tertiary); flex: 1;
    }
    .plugin-version { font-family: var(--mono); }
    .plugin-min-badge {
      padding: 3px 8px; border-radius: 999px;
      background: var(--bg-tertiary); color: var(--text-secondary);
      font-weight: 600;
    }
    .plugin-author { color: var(--text-tertiary); }
    .plugin-actions { display: flex; gap: 6px; }
    .plugin-btn {
      padding: 8px 14px; border-radius: 999px; border: none;
      font-size: 12px; font-weight: 700; cursor: default;
    }
    .plugin-btn-install { background: var(--text-primary); color: var(--bg-primary); }

    .plugins-loading, .plugins-empty { padding: 24px; text-align: center; color: var(--text-tertiary); font-size: 14px; }
    .footnote {
      max-width: var(--max); margin: 0 auto; padding: 0 20px 48px;
      font-size: 13px; color: var(--text-tertiary);
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <div class="brand">Cultiva <span>Plugins</span></div>
      <div class="nav-actions">
        <button type="button" class="pill active" data-lang="en">EN</button>
        <button type="button" class="pill" data-lang="ru">RU</button>
        <a class="pill" href="https://github.com/krwg/cultiva-plugins">GitHub</a>
      </div>
    </div>
  </header>

  <section class="hero">
    <h1 id="hero-title">Plugin Store</h1>
    <p id="hero-desc">The same catalog you see in Cultiva → Settings → Plugins. Sandboxed extensions with sha256 integrity checks.</p>
  </section>

  <section class="store">
    <div class="store-head">
      <h2 id="browse-title">Available plugins</h2>
      <span id="browse-hint">From catalog</span>
    </div>
    <div class="plugins-list" id="plugins-list">
      <div class="plugins-loading" id="loading">Loading catalog…</div>
    </div>
  </section>

  <p class="footnote" id="footnote">
    Install and enable plugins inside the <strong>Cultiva desktop app</strong> (Settings → Plugins).
  </p>

  <script>
    const REGISTRY_URLS = [
      'registry.json',
      'https://raw.githubusercontent.com/krwg/cultiva-plugins/main/registry.json'
    ];

    const COPY = {
      en: {
        heroTitle: 'Plugin Store',
        heroDesc: 'The same catalog you see in Cultiva → Settings → Plugins. Sandboxed extensions with sha256 integrity checks.',
        browseTitle: 'Available plugins',
        browseHint: 'From catalog',
        loading: 'Loading catalog…',
        empty: 'No plugins in registry.',
        error: 'Could not load registry.',
        minLabel: 'Requires Cultiva',
        install: 'Install',
        footnote: 'Install and enable plugins inside the Cultiva desktop app (Settings → Plugins).'
      },
      ru: {
        heroTitle: 'Магазин плагинов',
        heroDesc: 'Тот же каталог, что в Cultiva → Настройки → Плагины. Песочница и проверка sha256.',
        browseTitle: 'Доступные плагины',
        browseHint: 'Из каталога',
        loading: 'Загрузка каталога…',
        empty: 'В каталоге нет плагинов.',
        error: 'Не удалось загрузить каталог.',
        minLabel: 'Требуется Cultiva',
        install: 'Установить',
        footnote: 'Устанавливайте плагины в десктопном приложении Cultiva (Настройки → Плагины).'
      }
    };

    let lang = 'en';
    let registry = null;

    function t(key) { return (COPY[lang] && COPY[lang][key]) || COPY.en[key] || key; }

    function meta(p) {
      const row = p.i18n && p.i18n[lang] ? p.i18n[lang] : { name: p.name, description: p.description };
      return { name: row.name || p.name, description: row.description || p.description || '' };
    }

    function applyChrome() {
      document.getElementById('hero-title').textContent = t('heroTitle');
      document.getElementById('hero-desc').textContent = t('heroDesc');
      document.getElementById('browse-title').textContent = t('browseTitle');
      document.getElementById('browse-hint').textContent = t('browseHint');
      document.getElementById('footnote').innerHTML = t('footnote');
      document.querySelectorAll('[data-lang]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }

    function renderList() {
      const list = document.getElementById('plugins-list');
      list.replaceChildren();
      const plugins = Array.isArray(registry?.plugins) ? registry.plugins : [];
      if (!plugins.length) {
        const empty = document.createElement('div');
        empty.className = 'plugins-empty';
        empty.textContent = t('empty');
        list.appendChild(empty);
        return;
      }
      for (const p of plugins) {
        const m = meta(p);
        const card = document.createElement('article');
        card.className = 'plugin-card';
        card.innerHTML = `
          <div class="plugin-card-main">
            <div class="plugin-card-top">
              <div class="plugin-icon" aria-hidden="true"></div>
              <div class="plugin-info">
                <div class="plugin-name"></div>
                <div class="plugin-description"></div>
              </div>
            </div>
            <div class="plugin-card-footer">
              <div class="plugin-meta">
                <span class="plugin-version"></span>
                <span class="plugin-min-badge"></span>
                <span class="plugin-author"></span>
              </div>
              <div class="plugin-actions">
                <span class="plugin-btn plugin-btn-install"></span>
              </div>
            </div>
          </div>`;
        card.querySelector('.plugin-name').textContent = m.name;
        card.querySelector('.plugin-description').textContent = m.description;
        card.querySelector('.plugin-version').textContent = p.version ? `v${p.version}` : '';
        card.querySelector('.plugin-min-badge').textContent = p.minAppVersion ? `${t('minLabel')} ${p.minAppVersion}+` : '';
        card.querySelector('.plugin-author').textContent = p.author ? String(p.author) : '';
        card.querySelector('.plugin-btn').textContent = t('install');
        list.appendChild(card);
      }
    }

    async function fetchRegistry() {
      let lastError = null;
      for (const url of REGISTRY_URLS) {
        try {
          const res = await fetch(url, { cache: 'no-store' });
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          const data = await res.json();
          if (!Array.isArray(data?.plugins) || !data.plugins.length) {
            throw new Error('Empty plugins list');
          }
          return data;
        } catch (e) {
          lastError = e;
        }
      }
      throw lastError || new Error('Registry unavailable');
    }

    async function loadRegistry() {
      const list = document.getElementById('plugins-list');
      try {
        registry = await fetchRegistry();
        applyChrome();
        renderList();
      } catch {
        list.replaceChildren();
        const err = document.createElement('div');
        err.className = 'plugins-empty';
        err.textContent = t('error');
        list.appendChild(err);
      }
    }

    document.querySelectorAll('[data-lang]').forEach((btn) => {
      btn.addEventListener('click', () => {
        lang = btn.dataset.lang || 'en';
        applyChrome();
        renderList();
      });
    });

    applyChrome();
    loadRegistry();
  </script>
</body>
</html>
