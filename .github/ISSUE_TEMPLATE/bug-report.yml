name: Bug Report
description: Something wrong with an official plugin or the registry install flow
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        For **Cultiva app / sandbox** bugs, use [krwg/cultiva issues](https://github.com/krwg/cultiva/issues/new/choose).

  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      options:
        - weather
        - time
        - radio
        - pomodoro
        - quote
        - streak
        - registry (install / sha256)
        - other
    validations:
      required: true

  - type: input
    id: cultiva_version
    attributes:
      label: Cultiva version
      placeholder: "1.7.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output (optional)
      description: DevTools → Console, lines containing PluginManager or sandbox errors
      render: shell
